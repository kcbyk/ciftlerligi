<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Cift bilgilerini doldurarak anketi baslatin." />
    <title>Cift Bilgi Formu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <img class="watermark-logo" data-watermark-logo src="/assets/site-logo.jpeg" alt="Watermark" />

    <main class="page-shell">
      <header class="topbar">
        <div class="brand">
          <img class="brand-logo" data-logo src="/assets/site-logo.jpeg" alt="Logo" />
          <div class="brand-text">
            <h1 data-site-title>Çiftler Ligi Anketi</h1>
            <p data-site-description></p>
          </div>
        </div>
        <div class="social-links">
          <a class="social-link" data-instagram-link target="_blank" rel="noopener noreferrer" aria-label="Instagram">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <rect x="3" y="3" width="18" height="18" rx="5" stroke="currentColor" stroke-width="2" />
              <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2" />
              <circle cx="17.5" cy="6.5" r="1" fill="currentColor" />
            </svg>
          </a>
          <a class="social-link" data-youtube-link target="_blank" rel="noopener noreferrer" aria-label="YouTube">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <rect x="3" y="6" width="18" height="12" rx="4" stroke="currentColor" stroke-width="2" />
              <path d="M10 9L15 12L10 15V9Z" fill="currentColor" />
            </svg>
          </a>
        </div>
      </header>

      <section class="glass-card form-card">
        <h2>Cift Bilgi Formu</h2>
        <p data-info-text>[BILGILENDIRME_METNI]</p>

        <form id="pair-form" class="input-grid" novalidate>
          <label>
            1. kisi adi
            <input type="text" name="personOneName" placeholder="Orn: Ayse" maxlength="80" required />
          </label>

          <label>
            2. kisi adi
            <input type="text" name="personTwoName" placeholder="Orn: Mehmet" maxlength="80" required />
          </label>

          <label>
            Cift adi / ozel isim
            <input type="text" name="pairName" placeholder="Orn: Ask Yildizlari" maxlength="90" required />
          </label>

          <label>
            Cevaplayan kisi adi
            <input type="text" name="respondentName" placeholder="Hangi kisi su an anketi dolduruyor?" maxlength="80" required />
          </label>

          <label>
            Cinsiyet secimi
            <select name="genderType" required>
              <option value="">Seciniz</option>
              <option value="female">Kadin</option>
              <option value="male">Erkek</option>
            </select>
          </label>

          <button type="submit" class="primary-btn" data-primary-button-text>Devam Et</button>
        </form>

        <div id="form-feedback" class="hidden"></div>
      </section>

      <p class="footer-note">Yanlis veya eksik alan birakildiginda sistem uyari verecektir.</p>
    </main>

    <script type="module" src="/js/firebase-init.js"></script>
    <script src="/js/shared.js"></script>
    <script src="/js/form.js"></script>
  </body>
</html>
