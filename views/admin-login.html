<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Admin Giriş | Çiftler Ligi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <img class="watermark-logo" data-watermark-logo src="/assets/site-logo.jpeg" alt="Watermark" />

    <main class="page-shell">
      <header class="topbar">
        <div class="brand">
          <img class="brand-logo" data-logo src="/assets/site-logo.jpeg" alt="Logo" />
          <div class="brand-text">
            <h1>Gizli Admin Paneli</h1>
            <p>Yalnızca yetkili kullanıcılar içindir.</p>
          </div>
        </div>
      </header>

      <section class="glass-card form-card admin-login-card">
        <h2>Şifre ile giriş</h2>
        <p class="info-box">
          Bu alan backend doğrulaması ile korunur. Doğru şifre olmadan giriş yapılamaz.
        </p>

        <form id="admin-login-form" class="input-grid" autocomplete="off">
          <label for="admin-password">
            Admin şifresi
            <input
              id="admin-password"
              name="password"
              type="password"
              minlength="6"
              required
              placeholder="Şifreyi girin"
            />
          </label>

          <button class="primary-btn" type="submit">Panele Gir</button>
          <div id="admin-login-feedback" class="hidden"></div>
        </form>
      </section>
    </main>

    <script src="/js/shared.js"></script>
    <script src="/js/admin-login.js"></script>
  </body>
</html>
