<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Admin Panel | Çiftler Ligi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <img class="watermark-logo" data-watermark-logo src="/assets/site-logo.jpeg" alt="Watermark" />

    <main class="page-shell admin-shell">
      <header class="topbar">
        <div class="brand">
          <img class="brand-logo" data-logo src="/assets/site-logo.jpeg" alt="Logo" />
          <div class="brand-text">
            <h1>Admin Panel</h1>
            <p>Kurallar ve anket soruları yönetimi</p>
          </div>
        </div>

        <button id="admin-logout-btn" class="secondary-btn" type="button">Çıkış</button>
      </header>

      <section class="glass-card form-card">
        <h2>Kuralları Düzenle</h2>
        <div id="admin-rules-list" class="admin-rule-stack"></div>

        <div class="admin-actions-row">
          <button id="admin-add-rule-btn" type="button" class="ghost-btn">Kural Ekle</button>
          <button id="admin-save-rules-btn" type="button" class="primary-btn">Kuralları Kaydet</button>
        </div>

        <div id="admin-rules-feedback" class="hidden"></div>
      </section>

      <section class="glass-card form-card">
        <h2>Soru Yönetimi</h2>

        <div class="admin-gender-tabs">
          <button class="secondary-btn is-active" type="button" data-gender-tab="male">
            Erkek Soruları
          </button>
          <button class="secondary-btn" type="button" data-gender-tab="female">
            Kadın Soruları
          </button>
        </div>

        <form id="admin-new-question-form" class="admin-question-form">
          <h3>Yeni Soru Ekle</h3>

          <label for="new-question-text">
            Soru metni
            <input
              id="new-question-text"
              name="questionText"
              type="text"
              required
              maxlength="260"
              placeholder="Soru metnini yazın"
            />
          </label>

          <div class="admin-question-grid">
            <label for="new-question-type">
              Soru tipi
              <select id="new-question-type" name="questionType" required>
                <option value="single_choice">Tek seçim</option>
                <option value="multi_choice">Çoktan seçmeli</option>
                <option value="open_text">Açık uçlu</option>
                <option value="rating">Puanlama (1-10)</option>
              </select>
            </label>

            <label for="new-question-order">
              Sıra
              <input id="new-question-order" name="orderIndex" type="number" min="1" value="1" />
            </label>
          </div>

          <label for="new-question-options">
            Seçenekler (her satıra bir seçenek)
            <textarea
              id="new-question-options"
              name="optionsText"
              placeholder="Seçenek 1&#10;Seçenek 2&#10;Seçenek 3"
            ></textarea>
          </label>

          <div class="admin-inline-checks">
            <label class="admin-check-item">
              <input id="new-question-active" name="isActive" type="checkbox" checked />
              Aktif
            </label>
            <label class="admin-check-item">
              <input id="new-question-approved" name="approved" type="checkbox" checked />
              Onaylı
            </label>
          </div>

          <button class="primary-btn" type="submit">Soruyu Ekle</button>
        </form>

        <div id="admin-questions-feedback" class="hidden"></div>
        <div id="admin-questions-list" class="admin-question-list"></div>
      </section>
    </main>

    <script src="/js/shared.js"></script>
    <script src="/js/admin-dashboard.js"></script>
  </body>
</html>
